name: Test Windows Install

on:
  push:
    branches: [main]
    paths:
      - 'install.bat'
      - 'start.bat'
      - 'backend/requirements.txt'
      - 'frontend/package.json'
      - '.github/workflows/windows-install-test.yml'
  workflow_dispatch:   # Allow manual trigger from GitHub Actions tab

jobs:
  test-windows-install:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Verify prerequisites
        shell: cmd
        run: |
          echo Checking Python...
          python --version
          python -c "import sys; print('Python OK:', sys.executable)"

          echo Checking Node...
          node --version
          npm --version

          echo Checking Git...
          git --version

      - name: Create Python venv
        shell: cmd
        run: |
          cd backend
          python -m venv .venv
          if errorlevel 1 exit /b 1
          echo Venv created OK

      - name: Install Python dependencies
        shell: cmd
        run: |
          :: Use venv pip directly (more reliable than activating)
          backend\.venv\Scripts\pip.exe install --upgrade pip wheel setuptools --quiet
          backend\.venv\Scripts\pip.exe install -r backend\requirements.txt --disable-pip-version-check
          if errorlevel 1 exit /b 1
          echo Python deps installed OK

      - name: Install Node dependencies
        shell: cmd
        run: |
          cd frontend
          npm ci --silent
          if errorlevel 1 exit /b 1
          echo Node deps installed OK

      - name: Build frontend
        shell: cmd
        run: |
          cd frontend
          npm run build
          if errorlevel 1 exit /b 1
          if not exist dist\index.html (
            echo ERROR: dist\index.html not found
            exit /b 1
          )
          echo Frontend built OK

      - name: Copy frontend to backend static
        shell: cmd
        run: |
          if not exist backend\static mkdir backend\static
          xcopy /s /e /y frontend\dist\* backend\static\ >nul
          echo Static files copied OK

      - name: Start backend and run API checks
        shell: pwsh
        run: |
          $python = Resolve-Path "backend\.venv\Scripts\python.exe"
          $proc = Start-Process -FilePath $python -ArgumentList "-m","uvicorn","main:app","--host","127.0.0.1","--port","8001","--log-level","error" -WorkingDirectory "backend" -PassThru -NoNewWindow
          Write-Host "Server PID: $($proc.Id) — waiting 15s for startup..."
          Start-Sleep -Seconds 15

          # Check connection status
          try {
            $r1 = Invoke-WebRequest -Uri "http://127.0.0.1:8001/api/connection/status" -UseBasicParsing -TimeoutSec 8
            Write-Host "Connection status: $($r1.StatusCode) OK"
          } catch {
            Write-Host "ERROR: /api/connection/status failed - $_"
            $proc.Kill()
            exit 1
          }

          # Health check
          try {
            $r2 = Invoke-WebRequest -Uri "http://127.0.0.1:8001/api/health/full?check_imap=false" -UseBasicParsing -TimeoutSec 8
            Write-Host "Health check: $($r2.StatusCode) OK"
          } catch {
            Write-Host "WARNING: /api/health/full failed (may be expected in CI) - $_"
          }

          $proc.Kill()
          Write-Host "Server stopped cleanly"

      - name: Summary
        if: success()
        shell: cmd
        run: |
          echo.
          echo ============================================
          echo   ALL TESTS PASSED
          echo   Windows install is working correctly
          echo ============================================
