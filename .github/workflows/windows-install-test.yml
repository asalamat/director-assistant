name: Test Windows Install

on:
  push:
    paths:
      - 'install.bat'
      - 'start.bat'
      - 'backend/requirements.txt'
      - 'frontend/package.json'
  workflow_dispatch:

jobs:
  test-windows-install:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify prerequisites
        run: |
          python --version
          node --version
          git --version
        shell: cmd

      - name: Run install.bat (non-interactive)
        run: |
          :: Set INSTALL_DIR to avoid cloning (we already have the repo)
          set INSTALL_DIR=%GITHUB_WORKSPACE%
          set BACKEND=%INSTALL_DIR%\backend
          set FRONTEND=%INSTALL_DIR%\frontend

          :: Create venv
          python -m venv backend\.venv
          call backend\.venv\Scripts\activate.bat
          pip install -r backend\requirements.txt --disable-pip-version-check

          :: Build frontend
          cd frontend
          call npm install --silent
          call npm run build
          if not exist ..\backend\static mkdir ..\backend\static
          xcopy /s /e /y dist\* ..\backend\static\ >nul
          echo [OK] Install steps completed
        shell: cmd

      - name: Verify backend starts
        run: |
          call backend\.venv\Scripts\activate.bat
          cd backend
          start /b python -m uvicorn main:app --port 8001
          timeout /t 8 /nobreak >nul
          curl -s -o nul -w "%%{http_code}" http://localhost:8001/api/connection/status
        shell: cmd
        continue-on-error: true
